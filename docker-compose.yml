services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-immigration}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-immigration}
      POSTGRES_DB: ${POSTGRES_DB:-immigration_ai_office}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-immigration} -d ${POSTGRES_DB:-immigration_ai_office}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.5
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-immigration_ai_office}
      POSTGRES_USER: ${POSTGRES_USER:-immigration}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-immigration}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GMAIL_OAUTH_REDIRECT_PATH: ${GMAIL_OAUTH_REDIRECT_PATH:-/gmail/callback}
      GMAIL_TOKEN_ENCRYPTION_KEY: ${GMAIL_TOKEN_ENCRYPTION_KEY:-}
      GMAIL_PUBSUB_TOPIC_NAME: ${GMAIL_PUBSUB_TOPIC_NAME:-}
      GMAIL_WATCH_LABEL_IDS: ${GMAIL_WATCH_LABEL_IDS:-INBOX}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c 'import json,sys,urllib.request; sys.exit(0 if json.load(urllib.request.urlopen("http://localhost:8000/health")).get("status") == "ok" else 1)'
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    environment:
      NEXT_PUBLIC_BACKEND_HEALTH_PATH: /health
      NEXT_PUBLIC_GMAIL_STATUS_PATH: /gmail/status
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2.8.4
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
